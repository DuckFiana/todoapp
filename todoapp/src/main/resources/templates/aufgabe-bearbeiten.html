<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Aufgabe bearbeiten</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f5f5f5; }
        h1 { color: #333; }
        input[type=text], select { padding: 8px; width: 300px; }
        button { padding: 8px 16px; background-color: #4CAF50; color: white; border: none;
                 border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #45a049; }
        a { color: #333; text-decoration: none; }
        nav { margin-bottom: 20px; }
        .formular { background-color: white; padding: 20px; border-radius: 5px; }
        .formular div { margin-bottom: 10px; }
        label { display: inline-block; width: 120px; }
    </style>
</head>
<body>
<nav><a th:href="@{/aufgaben}">← Zurück zu Aufgaben</a></nav>
<h1>Aufgabe bearbeiten</h1>

<div class="formular">
    <form th:action="@{/aufgaben/aktualisieren}" th:object="${aufgabe}" method="post">
        <input type="hidden" th:field="*{id}"/>
        <div>
            <label>Titel:</label>
            <input type="text" th:field="*{titel}" required/>
        </div>
        <div>
            <label>Beschreibung:</label>
            <input type="text" th:field="*{beschreibung}"/>
        </div>
        <div>
            <label>Kategorie:</label>
            <select th:field="*{category.id}">
                <option th:each="kat : ${kategorien}"
                        th:value="${kat.id}"
                        th:text="${kat.name}">
                </option>
            </select>
        </div>
        <div>
            <label>Erledigt:</label>
            <input type="checkbox" th:field="*{erledigt}"/>
        </div>
        <button type="submit">Speichern</button>
    </form>
</div>
</body>
</html>
