<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Kategorie bearbeiten</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f5f5f5; }
        h1 { color: #333; }
        input[type=text] { padding: 8px; width: 300px; }
        button { padding: 8px 16px; background-color: #4CAF50; color: white; border: none;
                 border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #45a049; }
        a { color: #333; text-decoration: none; }
        nav { margin-bottom: 20px; }
    </style>
</head>
<body>
<nav><a th:href="@{/kategorien}">← Zurück zu Kategorien</a></nav>
<h1>Kategorie bearbeiten</h1>

<form th:action="@{/kategorien/aktualisieren}" th:object="${kategorie}" method="post">
    <input type="hidden" th:field="*{id}"/>
    <input type="text" th:field="*{name}" required/>
    <button type="submit">Speichern</button>
</form>
</body>
</html>
