<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Kategorien</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f5f5f5; }
        h1, h2 { color: #333; }
        table { border-collapse: collapse; width: 100%; background-color: white; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #4CAF50; color: white; }
        tr:hover { background-color: #f1f1f1; }
        input[type=text] { padding: 8px; width: 300px; }
        button { padding: 8px 16px; background-color: #4CAF50; color: white; border: none;
                 border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #45a049; }
        .btn-loeschen { background-color: #f44336; }
        .btn-loeschen:hover { background-color: #d32f2f; }
        .btn-bearbeiten { background-color: #2196F3; }
        .btn-bearbeiten:hover { background-color: #1976D2; }
        a { color: #333; text-decoration: none; }
        nav { margin-bottom: 20px; }
    </style>
</head>
<body>
<nav><a th:href="@{/}">← Startseite</a></nav>
<h1>Kategorien</h1>

<h2>Neue Kategorie anlegen</h2>
<form th:action="@{/kategorien/speichern}" th:object="${neueKategorie}" method="post">
    <input type="text" th:field="*{name}" placeholder="Kategoriename" required/>
    <button type="submit">Speichern</button>
</form>

<h2>Alle Kategorien</h2>
<table>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Aktionen</th>
    </tr>
    <tr th:each="kategorie : ${kategorien}">
        <td th:text="${kategorie.id}"></td>
        <td th:text="${kategorie.name}"></td>
        <td>
            <a th:href="@{/kategorien/bearbeiten/{id}(id=${kategorie.id})}">
                <button class="btn-bearbeiten">Bearbeiten</button>
            </a>
            <form th:action="@{/kategorien/loeschen/{id}(id=${kategorie.id})}"
                  method="post" style="display:inline"
                  onsubmit="return confirm('Kategorie wirklich löschen?');">
                <button class="btn-loeschen" type="submit">Löschen</button>
            </form>
        </td>
    </tr>
</table>
</body>
</html>
