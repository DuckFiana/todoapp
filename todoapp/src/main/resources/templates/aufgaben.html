<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Aufgaben</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f5f5f5; }
        h1, h2 { color: #333; }
        table { border-collapse: collapse; width: 100%; background-color: white; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #4CAF50; color: white; }
        tr:hover { background-color: #f1f1f1; }
        input[type=text], textarea, select { padding: 8px; width: 300px; }
        button { padding: 8px 16px; background-color: #4CAF50; color: white; border: none;
                 border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #45a049; }
        .btn-loeschen { background-color: #f44336; }
        .btn-loeschen:hover { background-color: #d32f2f; }
        .btn-bearbeiten { background-color: #2196F3; }
        .btn-bearbeiten:hover { background-color: #1976D2; }
        a { color: #333; text-decoration: none; }
        nav { margin-bottom: 20px; }
        .formular { background-color: white; padding: 20px; border-radius: 5px; margin-bottom: 20px; }
        .formular div { margin-bottom: 10px; }
        label { display: inline-block; width: 120px; }
        .erledigt { text-decoration: line-through; color: #999; }
    </style>
</head>
<body>
<nav><a th:href="@{/}">← Startseite</a></nav>
<h1>Aufgaben</h1>

<h2>Neue Aufgabe anlegen</h2>
<div class="formular">
    <form th:action="@{/aufgaben/speichern}" th:object="${neueAufgabe}" method="post">
        <div>
            <label>Titel:</label>
            <input type="text" th:field="*{titel}" placeholder="Aufgabentitel" required/>
        </div>
        <div>
            <label>Beschreibung:</label>
            <input type="text" th:field="*{beschreibung}" placeholder="Beschreibung (optional)"/>
        </div>
        <div>
            <label>Kategorie:</label>
            <select th:field="*{category.id}">
                <option th:each="kat : ${kategorien}"
                        th:value="${kat.id}"
                        th:text="${kat.name}">
                </option>
            </select>
        </div>
        <button type="submit">Speichern</button>
    </form>
</div>

<h2>Alle Aufgaben</h2>
<table>
    <tr>
        <th>Titel</th>
        <th>Beschreibung</th>
        <th>Kategorie</th>
        <th>Erledigt</th>
        <th>Aktionen</th>
    </tr>
    <tr th:each="aufgabe : ${aufgaben}">
        <td th:text="${aufgabe.titel}"
            th:classappend="${aufgabe.erledigt} ? 'erledigt'"></td>
        <td th:text="${aufgabe.beschreibung}"></td>
        <td th:text="${aufgabe.category.name}"></td>
        <td th:text="${aufgabe.erledigt} ? 'Ja' : 'Nein'">Nein</td>
        <td>
            <a th:href="@{/aufgaben/bearbeiten/{id}(id=${aufgabe.id})}">
                <button class="btn-bearbeiten">Bearbeiten</button>
            </a>
            <form th:action="@{/aufgaben/loeschen/{id}(id=${aufgabe.id})}"
                  method="post" style="display:inline"
                  onsubmit="return confirm('Aufgabe wirklich löschen?');">
                <button class="btn-loeschen" type="submit">Löschen</button>
            </form>
        </td>
    </tr>
